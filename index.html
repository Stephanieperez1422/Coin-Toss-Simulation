<!DOCTYPE html>
<html>
<head>
    <title>Coin Toss Simulation</title>
</head>
<body>

<h2>Coin Toss Simulation (100 Tosses)</h2>

<?php
$heads = 0;
$tails = 0;

for ($i = 1; $i <= 100; $i++) {
    $toss = rand(0, 1); // 0 = heads, 1 = tails

    if ($toss == 0) {
        $heads++;
    } else {
        $tails++;
    }
}

echo "Heads: " . $heads . "<br>";
echo "Tails: " . $tails;
?>

</body>
</html>
